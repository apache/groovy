import org.apache.groovy.gradle.DispatchMetricsSummary
import org.apache.groovy.gradle.PerformanceTestsExtension
import org.apache.groovy.gradle.PerformanceTestSummary

plugins {
    id 'groovy'
    id 'org.apache.groovy-common'
    id 'org.apache.groovy-internal'
    id 'me.champeau.jmh'
}

project.extensions.create('performanceTests', PerformanceTestsExtension, objects, tasks, configurations, dependencies, sourceSets)

configurations {
    stats
    testImplementation.extendsFrom(stats)
}

repositories {
    mavenCentral()
    maven {
        url = 'https://repository.ow2.org/nexus/content/repositories/public/'
    }
}

dependencies {
    implementation project(':')
    jmh project(':')
    testImplementation project(':')
    testImplementation "org.junit.jupiter:junit-jupiter-api:${versions.junit6}"
    testRuntimeOnly "org.junit.jupiter:junit-jupiter-engine:${versions.junit6}"
    testRuntimeOnly "org.junit.platform:junit-platform-launcher:${versions.junit6}"

    stats "org.apache.commons:commons-math3:${versions.commonsMath3}"
}

jmh {
    jmhVersion = versions.jmh
    if (project.hasProperty('benchInclude')) {
        includes = ['.*' + project.benchInclude + '.*']
    }
    includeTests = true
    if (project.hasProperty('jmhResultFormat')) {
        resultFormat = project.jmhResultFormat
    }
    if (project.hasProperty('jmhProfilers')) {
        profilers = project.jmhProfilers.split(',') as List
    }
}

jmhJar {
    exclude 'LICENSE'
    exclude 'THIRD-PARTY'
}

tasks.named('jmhClasses') {
    dependsOn tasks.named('clean')
}

var indy = (project.findProperty('indy') ?: 'true').toBoolean()

tasks.named('compileJmhGroovy') {
    classpath += compileJmhJava.classpath
    groovyOptions.optimizationOptions.indy = indy
    inputs.property('indy', indy)
}

tasks.named('compileGroovy') {
    groovyOptions.optimizationOptions.indy = indy
    inputs.property('indy', indy)
}

tasks.register('displayJmhResults') {
    dependsOn('jmh')
    doLast {
        println layout.buildDirectory.file('results/jmh/results.txt').get().asFile.text
    }
}

tasks.register('performanceTests', PerformanceTestSummary)

// Deterministic dispatch metrics: run a fixed cold-dispatch workload in a
// fresh JVM with class+load logging, then reduce the log plus the workload's
// own bytecode-size figures to exact, runner-independent counters. See
// DispatchMetricsSummary and DispatchMetricsWorkload for details.
def dispatchMetricsLog = layout.buildDirectory.file('dispatch-metrics/classload.log')
def dispatchWorkloadJson = layout.buildDirectory.file('dispatch-metrics/workload-metrics.json')
// dependency-free subset of the compiler-perf corpus (the other pleac files
// need third-party libraries on the compile classpath)
def dispatchCorpus = files(
    'src/files/script.groovy',
    'src/files/pleac02.groovy',
    'src/files/pleac03.groovy',
    'src/files/pleac04.groovy',
    'src/jmh/groovy/org/apache/groovy/bench/Ackermann.groovy',
    'src/jmh/groovy/org/apache/groovy/bench/Ary.groovy',
    'src/jmh/groovy/org/apache/groovy/bench/Fibo.groovy')

def dispatchMetricsRun = tasks.register('dispatchMetricsRun', JavaExec) {
    description = 'Runs the deterministic dispatch workload with class-load logging'
    group = 'Performance'
    classpath = sourceSets.main.runtimeClasspath
    mainClass = 'org.apache.groovy.perf.metrics.DispatchMetricsWorkload'
    inputs.files(dispatchCorpus)
    outputs.file(dispatchMetricsLog)
    outputs.file(dispatchWorkloadJson)
    def logFile = dispatchMetricsLog.get().asFile
    jvmArgs "-Xlog:class+load=info:file=${logFile.absolutePath}:none"
    args([dispatchWorkloadJson.get().asFile.absolutePath] + dispatchCorpus.files.sort()*.absolutePath)
    doFirst {
        logFile.parentFile.mkdirs()
        logFile.delete()
    }
}

tasks.register('dispatchMetrics', DispatchMetricsSummary) {
    description = 'Summarises deterministic dispatch metrics (class-load and bytecode-size counters)'
    group = 'Performance'
    dependsOn dispatchMetricsRun
    classLoadLog = dispatchMetricsLog
    workloadJson = dispatchWorkloadJson
}

sonarqube {
    skipProject = true
}

tasks.named('test') {
    useJUnitPlatform()
}

tasks.named('jmh') {
    inputs.property('benchInclude', project.findProperty('benchInclude') ?: '')
    dependsOn tasks.named('jmhClasses')
}

tasks.named('jmhJar') {
    from(sourceSets.jmh.output)
}
