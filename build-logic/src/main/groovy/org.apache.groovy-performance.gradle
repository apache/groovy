import org.apache.groovy.gradle.PerformanceTestsExtension
import org.apache.groovy.gradle.PerformanceTestSummary

plugins {
    id 'groovy'
    id 'org.apache.groovy-common'
    id 'org.apache.groovy-internal'
    id 'me.champeau.jmh'
}

project.extensions.create('performanceTests', PerformanceTestsExtension, objects, tasks, configurations, dependencies, sourceSets)

configurations {
    stats
    testImplementation.extendsFrom(stats)
}

repositories {
    mavenCentral()
    maven {
        url = 'https://repository.ow2.org/nexus/content/repositories/public/'
    }
}

dependencies {
    // Use jmhImplementation (not the bare `jmh` bucket): the jmh compile/runtime
    // classpaths carry the full attribute set, so Gradle selects the shaded
    // (jarjar) Groovy variant. The bare `jmh` configuration under-specifies
    // attributes and falls back to the un-shaded *raw* variant, which put a second
    // Groovy jar (plus duplicate asm/antlr) on the jmh classpath.
    jmhImplementation project(':')
    testImplementation project(':')
    testImplementation "org.junit.jupiter:junit-jupiter-api:${versions.junit6}"
    testRuntimeOnly "org.junit.jupiter:junit-jupiter-engine:${versions.junit6}"
    testRuntimeOnly "org.junit.platform:junit-platform-launcher:${versions.junit6}"

    stats "org.apache.commons:commons-math3:${versions.commonsMath3}"
}

jmh {
    jmhVersion = versions.jmh
    if (project.hasProperty('benchInclude')) {
        includes = ['.*' + project.benchInclude + '.*']
    }
    includeTests = true
    if (project.hasProperty('jmhResultFormat')) {
        resultFormat = project.jmhResultFormat
    }
    if (project.hasProperty('jmhProfilers')) {
        profilers = project.jmhProfilers.split(',') as List
    }
}

jmhJar {
    exclude 'LICENSE'
    exclude 'THIRD-PARTY'
}

tasks.named('jmhClasses') {
    dependsOn tasks.named('clean')
}

var indy = (project.findProperty('indy') ?: 'true').toBoolean()

tasks.named('compileJmhGroovy') {
    classpath += compileJmhJava.classpath
    groovyOptions.optimizationOptions.indy = indy
    inputs.property('indy', indy)
}

tasks.register('displayJmhResults') {
    dependsOn('jmh')
    doLast {
        println layout.buildDirectory.file('results/jmh/results.txt').get().asFile.text
    }
}

tasks.register('performanceTests', PerformanceTestSummary)

sonarqube {
    skipProject = true
}

tasks.named('test') {
    useJUnitPlatform()
}

tasks.named('jmh') {
    inputs.property('benchInclude', project.findProperty('benchInclude') ?: '')
    dependsOn tasks.named('jmhClasses')
    // me.champeau.jmh builds a self-contained uber jar (the jmhJar artifact) and
    // then runs benchmarks with a classpath of: the `jmh` configuration + that
    // uber jar + the test runtime classpath. That puts Groovy core on the run
    // classpath three times — the `jmh` config even resolves the un-shaded *raw*
    // Groovy variant (dragging duplicate asm/antlr) — which trips
    // MetaClassRegistryImpl's "duplicate concurrent module" warning. The uber jar
    // already contains everything needed to run, so clear the two loose
    // collections and let it be the single source: every class (Groovy included)
    // then appears exactly once.
    jmhClasspath.setFrom()
    testRuntimeClasspath.setFrom()
}

tasks.named('jmhJar') {
    from(sourceSets.jmh.output)
}
