import org.apache.groovy.gradle.JarJarTask

plugins {
    id 'org.apache.groovy-common'
    id 'org.apache.groovy-base'
    id 'org.apache.groovy-published-library'
    id 'org.apache.groovy-documented'
}

dependencies {
    testImplementation testFixtures(project(":"))
}

tasks.named('jarjar') { JarJarTask jjt ->
    def groovyBundleVersion = sharedConfiguration.groovyBundleVersion.get()
    jjt.bndInstruction('-nouses', 'true')
    jjt.bndInstruction('Export-Package', "*;version=${groovyBundleVersion}")
    jjt.bndInstruction('Fragment-Host', 'groovy') // GROOVY-9402, GROOVY-11570
    def folder = file("${projectDir}/src/main/resources/META-INF/services")
    if (folder.exists() && folder.listFiles().count { it.name ==~ /^(?!(org.codehaus.groovy.transform.ASTTransformation)$).*$/ } > 0) {
        jjt.appendBndInstruction('Require-Capability', 'osgi.extender;filter:="(osgi.extender=osgi.serviceloader.processor)"')
        jjt.appendBndInstruction('Require-Capability', 'osgi.extender;filter:="(osgi.extender=osgi.serviceloader.registrar)"')
        folder.eachFileMatch(~/^(?!(org.codehaus.groovy.transform.ASTTransformation)$).*$/) {
            jjt.appendBndInstruction('Require-Capability', "osgi.serviceloader;filter:=\"(osgi.serviceloader=${it.name})\";cardinality:=multiple")
            jjt.appendBndInstruction('Provide-Capability', "osgi.serviceloader;osgi.serviceloader=\"${it.name}\"")
        }
    }
}
