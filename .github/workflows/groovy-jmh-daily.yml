name: jmh-daily

on:
  schedule:
    - cron: '0 6 * * *'   # 06:00 UTC daily
  workflow_dispatch:

permissions:
  contents: write         # gh-pages push
  deployments: write
  issues: write           # commit comments

jobs:
  benchmark:
    strategy:
      fail-fast: false
      matrix:
        include:
          - suite: bench
            pattern: '\\.bench\\.'
            indy: indy
            indyFlag: ''
          - suite: bench
            pattern: '\\.bench\\.'
            indy: classic
            indyFlag: '-Pindy=false'
          - suite: core
            pattern: '\\.perf\\.[A-Z]'
            indy: indy
            indyFlag: ''
          - suite: core
            pattern: '\\.perf\\.[A-Z]'
            indy: classic
            indyFlag: '-Pindy=false'
          - suite: grails
            pattern: '\\.perf\\.grails\\.'
            indy: indy
            indyFlag: ''
          - suite: grails
            pattern: '\\.perf\\.grails\\.'
            indy: classic
            indyFlag: '-Pindy=false'
    runs-on: ubuntu-latest
    env:
      DEVELOCITY_ACCESS_KEY: ${{ secrets.DEVELOCITY_ACCESS_KEY }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: 21
          check-latest: true
      - uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c # v5.0.2

      - name: JMH (${{ matrix.suite }} ${{ matrix.indy }})
        run: ./gradlew perf:jmh -PbenchInclude=${{ matrix.pattern }} ${{ matrix.indyFlag }} -PjmhResultFormat=JSON
        timeout-minutes: 60

      # Temporarily disabled pending ASF approval of the benchmark-action/github-action-benchmark third-party action.
      # Re-enable by uncommenting the step below once the action is on the approved list.
      # - name: Publish to dashboard
      #   uses: benchmark-action/github-action-benchmark@52576c92bccf6ac60c8223ec7eb2565637cae9ba # v1.22.1
      #   with:
      #     tool: 'jmh'
      #     output-file-path: subprojects/performance/build/results/jmh/results.json
      #     benchmark-data-dir-path: dev/bench/jmh/${{ matrix.suite }}/${{ matrix.indy }}
      #     gh-pages-branch: gh-pages
      #     auto-push: true
      #     comment-always: true
      #     alert-threshold: '120%'
      #     fail-on-alert: false
      #     github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload reports-jmh-${{ matrix.suite }}-${{ matrix.indy }}
        uses: actions/upload-artifact@v7
        with:
          name: reports-jmh-${{ matrix.suite }}-${{ matrix.indy }}
          path: subprojects/performance/build/results/jmh/
