name: Check licenses

on:
  push:
    branches:
      - master
      - GROOVY_*
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
    runs-on: ${{ matrix.os }}
    env:
      DEVELOCITY_ACCESS_KEY: ${{ secrets.DEVELOCITY_ACCESS_KEY }}
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-java@v5.5.0
        with:
          distribution: 'zulu'
          java-version: 21
          check-latest: true
      # Restore-only (never saves): this job resolves just the plugin
      # classpath + rat deps — a small subset of the `build` lineage. If it
      # saved, it could win the save race for a new key and pin a thin cache
      # that groovy-build-test.yml could then not overwrite until the next
      # key rotation. See groovy-build-test.yml (lts job) for the full
      # caching rationale.
      - name: "🗄 Restore Gradle dependencies (~/.gradle/caches/modules-2 + wrapper)"
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.gradle/caches/modules-2
            ~/.gradle/wrapper
          key: gradle-deps-${{ runner.os }}-build-${{ github.base_ref || github.ref_name }}-${{ hashFiles('versions.properties', 'gradle/wrapper/gradle-wrapper.properties', 'settings.gradle', 'build-logic/build.gradle') }}
          restore-keys: |
            gradle-deps-${{ runner.os }}-build-${{ github.base_ref || github.ref_name }}-
      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
        # The action's own caching is disabled: dependency jars and wrapper
        # dists are cached by the explicit branch-keyed step above instead.
        with:
          cache-disabled: true
      - name: Check licenses with rat
        run: ./gradlew rat
        timeout-minutes: 60
