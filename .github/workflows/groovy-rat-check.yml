name: Check licenses

on:
  push:
    branches:
      - master
      - GROOVY_*
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
    runs-on: ${{ matrix.os }}
    env:
      DEVELOCITY_ACCESS_KEY: ${{ secrets.DEVELOCITY_ACCESS_KEY }}
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-java@v5.4.0
        with:
          distribution: 'zulu'
          java-version: 21
          check-latest: true
      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
        # 'basic' uses the MIT-licensed, open-source cache provider; the default
        # 'enhanced' provider (v6+) is proprietary (Gradle commercial Terms of Use)
        with:
          cache-provider: basic
      - name: Check licenses with rat
        run: ./gradlew rat
        timeout-minutes: 60
