name: jmh

on: [push, pull_request]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  test:
    if: >-
      contains(github.event.head_commit.message || '', 'GROOVY-') ||
      contains(github.event.pull_request.title || '', 'GROOVY-')
    strategy:
      fail-fast: false
      matrix:
        include:
          - suite: bench
            pattern: '\\.bench\\.'
          - suite: core
            pattern: '\\.perf\\.[A-Z]'
          - suite: grails
            pattern: '\\.perf\\.grails\\.'
    runs-on: ubuntu-latest
    env:
      DEVELOCITY_ACCESS_KEY: ${{ secrets.DEVELOCITY_ACCESS_KEY }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: 21
          check-latest: true
      - uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c # v5.0.2
      - name: JMH (${{ matrix.suite }})
        run: ./gradlew perf:jmh -PbenchInclude=${{ matrix.pattern }} -PjmhResultFormat=JSON
        timeout-minutes: 60
      - name: Rename JMH result file
        run: |
          mv subprojects/performance/build/results/jmh/results.json \
             subprojects/performance/build/results/jmh/results-${{ matrix.suite }}.json

      # Temporarily disabled pending ASF approval of the benchmark-action/github-action-benchmark third-party action.
      # Re-enable by uncommenting the two steps below once the action is on the approved list.
