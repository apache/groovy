name: perf-daily

on:
  schedule:
    - cron: '30 6 * * *'   # 06:30 UTC daily (after jmh-daily 06:00)
  workflow_dispatch:

permissions:
  contents: write         # gh-pages push
  deployments: write
  issues: write           # commit comments

jobs:
  benchmark:
    runs-on: ubuntu-latest
    env:
      DEVELOCITY_ACCESS_KEY: ${{ secrets.DEVELOCITY_ACCESS_KEY }}
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-java@v5.4.0
        with:
          distribution: 'zulu'
          java-version: 21
          check-latest: true
      # Cache downloaded dependency jars/poms + wrapper dists, keyed per
      # branch; see groovy-build-test.yml (lts job) for the full rationale.
      # The `perf` key segment keeps a cache lineage for the perf/JMH
      # workflow family, whose dependency set differs from the main build.
      - name: "🗄 Cache Gradle dependencies (~/.gradle/caches/modules-2 + wrapper)"
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.gradle/caches/modules-2
            ~/.gradle/wrapper
          key: gradle-deps-${{ runner.os }}-perf-${{ github.base_ref || github.ref_name }}-${{ hashFiles('versions.properties', 'gradle/wrapper/gradle-wrapper.properties', 'settings.gradle', 'build-logic/build.gradle') }}
          restore-keys: |
            gradle-deps-${{ runner.os }}-perf-${{ github.base_ref || github.ref_name }}-
      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
        # The action's own caching is disabled: dependency jars and wrapper
        # dists are cached by the explicit branch-keyed step above instead.
        with:
          cache-disabled: true

      # Compiles a fixed set of source files using current + latest 3.x/4.x/5.x.
      # Versions tracked are configured in subprojects/performance/build.gradle
      # via `versions 'current', versions.latest3, versions.latest4, versions.latest5`.
      - name: Compiler performance tests
        run: ./gradlew :perf:performanceTests
        timeout-minutes: 120

      # Dashboard: https://apache.github.io/groovy/dev/bench/perf/compiler/
      # Data is appended to dev/bench/perf/compiler/data.js on the gh-pages branch.
      # To remove a noisy run for commit <BAD_SHA>:
      #   git checkout gh-pages
      #   F=dev/bench/perf/compiler/data.js
      #   sed 's/^window\.BENCHMARK_DATA = //; s/;[[:space:]]*$//' "$F" > /tmp/d.json
      #   jq 'del(.entries[][] | select(.commit.id == "<BAD_SHA>"))' /tmp/d.json > /tmp/c.json
      #   { printf 'window.BENCHMARK_DATA = '; cat /tmp/c.json; printf ';\n'; } > "$F"
      #   git commit -am "Drop noisy perf run for <BAD_SHA>" && git push
      - name: Publish to dashboard
        uses: benchmark-action/github-action-benchmark@52576c92bccf6ac60c8223ec7eb2565637cae9ba # v1.22.1
        with:
          name: 'Compiler Performance'
          tool: 'customSmallerIsBetter'
          output-file-path: subprojects/performance/build/performance-results.json
          benchmark-data-dir-path: dev/bench/perf/compiler
          gh-pages-branch: gh-pages
          auto-push: true
          comment-always: true
          alert-threshold: '140%'
          fail-on-alert: false
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # Deterministic dispatch metrics: class-loading and bytecode-size
      # counters from a fixed cold-dispatch workload. Values are exact for a
      # given JDK + Groovy build (no timing), so they are comparable across
      # runner hardware and get a tight alert threshold.
      # Dashboard data: dev/bench/perf/dispatch/data.js on gh-pages.
      - name: Dispatch metrics
        run: ./gradlew :perf:dispatchMetrics
        timeout-minutes: 20

      - name: Publish dispatch metrics
        uses: benchmark-action/github-action-benchmark@52576c92bccf6ac60c8223ec7eb2565637cae9ba # v1.22.1
        with:
          name: 'Dispatch Metrics'
          tool: 'customSmallerIsBetter'
          output-file-path: subprojects/performance/build/dispatch-metrics.json
          benchmark-data-dir-path: dev/bench/perf/dispatch
          gh-pages-branch: gh-pages
          auto-push: true
          comment-always: true
          alert-threshold: '110%'
          fail-on-alert: false
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # The action writes a default index.html on first run and leaves it in
      # place after that. We overlay our custom (4-series, normalised) page
      # every run, but only commit if it has actually changed. The gh-pages
      # root landing page is synced from source control here too, so new
      # dashboards get linked via normal review rather than manual gh-pages
      # edits.
      - name: Install custom dashboard pages
        run: |
          set -euo pipefail
          # Sync the custom page AND its locally-vendored JS (vendor/) so the
          # published dashboard has no third-party CDN runtime dependency.
          SRC_DIR=subprojects/performance/dashboard
          DEST_DIR=dev/bench/perf/compiler
          git fetch origin gh-pages
          git worktree add /tmp/gh-pages gh-pages
          mkdir -p "/tmp/gh-pages/$DEST_DIR/vendor"
          cp "$SRC_DIR/index.html" "/tmp/gh-pages/$DEST_DIR/index.html"
          # Mirror vendor/ exactly (drop files removed upstream, e.g. on a
          # version bump) but keep data.js and other generated siblings.
          rsync -a --delete "$SRC_DIR/vendor/" "/tmp/gh-pages/$DEST_DIR/vendor/"
          # Landing page for apache.github.io/groovy — source of truth is
          # root-index.html on master; the gh-pages copy is overwritten.
          cp "$SRC_DIR/root-index.html" /tmp/gh-pages/index.html
          cd /tmp/gh-pages
          git add "$DEST_DIR/index.html" "$DEST_DIR/vendor" index.html
          if git diff --cached --quiet; then
            echo 'Dashboard pages and vendored assets already up to date.'
          else
            git config user.name 'github-actions[bot]'
            git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
            git commit -m 'Update dashboard pages'
            git push origin gh-pages
          fi

      - name: Upload reports-perf-compiler
        uses: actions/upload-artifact@v7
        with:
          name: reports-perf-compiler
          path: |
            subprojects/performance/build/performance-results.json
            subprojects/performance/build/compilation-stats-*.csv
