name: perf-daily

on:
  schedule:
    - cron: '30 6 * * *'   # 06:30 UTC daily (after jmh-daily 06:00)
  workflow_dispatch:

permissions:
  contents: write         # gh-pages push
  deployments: write
  issues: write           # commit comments

jobs:
  benchmark:
    runs-on: ubuntu-latest
    env:
      DEVELOCITY_ACCESS_KEY: ${{ secrets.DEVELOCITY_ACCESS_KEY }}
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-java@v5.3.0
        with:
          distribution: 'zulu'
          java-version: 21
          check-latest: true
      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
        # 'basic' uses the MIT-licensed, open-source cache provider; the default
        # 'enhanced' provider (v6+) is proprietary (Gradle commercial Terms of Use)
        with:
          cache-provider: basic

      # Compiles a fixed set of source files using current + latest 3.x/4.x/5.x.
      # Versions tracked are configured in subprojects/performance/build.gradle
      # via `versions 'current', versions.latest3, versions.latest4, versions.latest5`.
      - name: Compiler performance tests
        run: ./gradlew :perf:performanceTests
        timeout-minutes: 120

      # Dashboard: https://apache.github.io/groovy/dev/bench/perf/compiler/
      # Data is appended to dev/bench/perf/compiler/data.js on the gh-pages branch.
      # To remove a noisy run for commit <BAD_SHA>:
      #   git checkout gh-pages
      #   F=dev/bench/perf/compiler/data.js
      #   sed 's/^window\.BENCHMARK_DATA = //; s/;[[:space:]]*$//' "$F" > /tmp/d.json
      #   jq 'del(.entries[][] | select(.commit.id == "<BAD_SHA>"))' /tmp/d.json > /tmp/c.json
      #   { printf 'window.BENCHMARK_DATA = '; cat /tmp/c.json; printf ';\n'; } > "$F"
      #   git commit -am "Drop noisy perf run for <BAD_SHA>" && git push
      - name: Publish to dashboard
        uses: benchmark-action/github-action-benchmark@52576c92bccf6ac60c8223ec7eb2565637cae9ba # v1.22.1
        with:
          name: 'Compiler Performance'
          tool: 'customSmallerIsBetter'
          output-file-path: subprojects/performance/build/performance-results.json
          benchmark-data-dir-path: dev/bench/perf/compiler
          gh-pages-branch: gh-pages
          auto-push: true
          comment-always: true
          alert-threshold: '140%'
          fail-on-alert: false
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # The action writes a default index.html on first run and leaves it in
      # place after that. We overlay our custom (4-series, normalised) page
      # every run, but only commit if it has actually changed.
      - name: Install custom dashboard page
        run: |
          set -euo pipefail
          # Sync the custom page AND its locally-vendored JS (vendor/) so the
          # published dashboard has no third-party CDN runtime dependency.
          SRC_DIR=subprojects/performance/dashboard
          DEST_DIR=dev/bench/perf/compiler
          git fetch origin gh-pages
          git worktree add /tmp/gh-pages gh-pages
          mkdir -p "/tmp/gh-pages/$DEST_DIR/vendor"
          cp "$SRC_DIR/index.html" "/tmp/gh-pages/$DEST_DIR/index.html"
          # Mirror vendor/ exactly (drop files removed upstream, e.g. on a
          # version bump) but keep data.js and other generated siblings.
          rsync -a --delete "$SRC_DIR/vendor/" "/tmp/gh-pages/$DEST_DIR/vendor/"
          cd /tmp/gh-pages
          git add "$DEST_DIR/index.html" "$DEST_DIR/vendor"
          if git diff --cached --quiet; then
            echo 'Custom dashboard page and vendored assets already up to date.'
          else
            git config user.name 'github-actions[bot]'
            git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
            git commit -m 'Update compiler performance dashboard page'
            git push origin gh-pages
          fi

      - name: Upload reports-perf-compiler
        uses: actions/upload-artifact@v7
        with:
          name: reports-perf-compiler
          path: |
            subprojects/performance/build/performance-results.json
            subprojects/performance/build/compilation-stats-*.csv
