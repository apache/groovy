name: Performance check

on:
  push:
    branches:
      - master
      - GROOVY_*
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read
  pull-requests: write   # dispatch-metrics regression comments
  issues: write

jobs:
  test:
    if: >-
      contains(github.event.head_commit.message || '', 'GROOVY-') ||
      contains(github.event.pull_request.title || '', 'GROOVY-')
    strategy:
      fail-fast: false
    runs-on: ubuntu-latest
    env:
      DEVELOCITY_ACCESS_KEY: ${{ secrets.DEVELOCITY_ACCESS_KEY }}
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-java@v5.4.0
        with:
          distribution: 'zulu'
          java-version: 21
          check-latest: true
      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
        # 'basic' uses the MIT-licensed, open-source cache provider; the default
        # 'enhanced' provider (v6+) is proprietary (Gradle commercial Terms of Use)
        with:
          cache-provider: basic
      - name: Compiler performance comparison
        run: ./gradlew perf:performanceTests
        timeout-minutes: 60

      # Deterministic dispatch metrics (class-loading and bytecode-size
      # counters). Unlike the timing benchmarks these are exact for a given
      # JDK + Groovy build, so comparing against history published from
      # *different* runner hardware is sound and the threshold can be tight.
      - name: Dispatch metrics
        run: ./gradlew perf:dispatchMetrics
        timeout-minutes: 20

      - name: Fetch dispatch metrics baseline
        id: dispatch-baseline
        run: |
          URL="https://apache.github.io/groovy/dev/bench/perf/dispatch/data.js"
          if curl -fsSL "$URL" -o dispatch-data.js; then
            sed -e 's/^window\.BENCHMARK_DATA = //' -e 's/;[[:space:]]*$//' dispatch-data.js > dispatch-prev.json
            echo 'found=true' >> "$GITHUB_OUTPUT"
          else
            # perf-daily has not published dispatch metrics yet; the action
            # cannot handle an empty external data file, so skip the compare.
            echo 'No dispatch metrics baseline on gh-pages yet; skipping comparison.'
            echo 'found=false' >> "$GITHUB_OUTPUT"
          fi

      - name: Compare dispatch metrics against history
        if: steps.dispatch-baseline.outputs.found == 'true'
        uses: benchmark-action/github-action-benchmark@52576c92bccf6ac60c8223ec7eb2565637cae9ba # v1.22.1
        with:
          name: 'Dispatch Metrics'
          tool: 'customSmallerIsBetter'
          output-file-path: subprojects/performance/build/dispatch-metrics.json
          external-data-json-path: ./dispatch-prev.json
          save-data-file: false
          summary-always: true
          # fork PRs get a read-only token; commenting there would 403 and fail the step
          comment-on-alert: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
          alert-threshold: '110%'
          fail-on-alert: false
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload perf report
        uses: actions/upload-artifact@v7
        with:
          name: perf-reports
          path: |
            subprojects/performance/build/*.csv
            subprojects/performance/build/dispatch-metrics.json
