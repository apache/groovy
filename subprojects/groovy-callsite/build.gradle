plugins {
    id 'org.apache.groovy-library'
}

dependencies {
    // Classic call-site caching runtime; depends on core, never the reverse.
    api rootProject
    testImplementation projects.groovyTest
}

groovyLibrary {
    // Optional / deprecated compatibility module — not part of groovy-all.
    optionalModule()
    // Classes lived in core before Groovy 6; japicmp against 5.x is not applicable.
    withoutBinaryCompatibilityChecks()
}

// The whole module is deprecated; avoid noisy self-deprecation compile warnings.
tasks.withType(JavaCompile).configureEach {
    options.compilerArgs << '-Xlint:-deprecation'
}
