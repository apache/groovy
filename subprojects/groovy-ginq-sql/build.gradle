plugins {
    id 'org.apache.groovy-library'
}

dependencies {
    api rootProject
    api projects.groovyGinq
    api projects.groovySql
    testImplementation projects.groovyTest
    testImplementation 'org.hsqldb:hsqldb:2.7.4'
}

groovyLibrary {
    optionalModule()

    withoutBinaryCompatibilityChecks()
}

// GINQ macros expand at test-compile time using this module's classes, so the
// provider implementation (not just its ABI) is a genuine input; without this,
// compilation avoidance and the build cache can reuse test classes containing
// stale macro expansions
tasks.named('compileTestGroovy') {
    inputs.files(tasks.named('compileGroovy').flatMap { it.destinationDirectory })
            .withPropertyName('sqlProviderImplementation')
}
