plugins {
    id 'groovy'
    id 'org.apache.groovy-common'
    id 'org.apache.groovy-internal'
    id 'org.apache.groovy-tested'
}

dependencies {
    implementation rootProject
    testImplementation projects.groovyTest

    testImplementation "ch.qos.logback:logback-classic:${versions.logback}"
    testImplementation "log4j:log4j:${versions.log4j}"
    testImplementation "org.apache.logging.log4j:log4j-core:${versions.log4j2}"
    testImplementation "org.slf4j:jcl-over-slf4j:${versions.slf4j}"
}

sourceSets {
    test {
        resources {
            srcDirs += ['src/test-resources']
        }
    }
}

tasks.named('compileTestGroovy') {
    // Avoid reusing cross-JDK cached test classes (e.g. classfile version 65 on JDK 17 lanes).
    outputs.cacheIf { false }
}

